name: mobile_app
description: ProductivityOS Mobile Companion
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  
  # Navigation
  go_router: ^17.2.3
  
  # Networking
  dio: ^5.4.1
  connectivity_plus: ^7.1.1
  
  # Storage
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.6.0+eol
  flutter_secure_storage: ^10.2.0
  shared_preferences: ^2.2.3
  
  path_provider: ^2.1.2
  path: ^1.9.0
  
  # UI & Design System
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  percent_indicator: ^4.2.3
  fl_chart: ^1.2.0
  
  # Services
  flutter_local_notifications: ^21.0.0
  firebase_messaging: ^16.2.2
  flutter_background_service: ^5.0.7
  usage_stats: ^1.1.0
  system_alert_window: ^2.0.11
  workmanager: ^0.9.0+3
  home_widget: ^0.9.1
  speech_to_text: ^7.3.0
  intl: ^0.20.2
  timezone: ^0.11.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true

